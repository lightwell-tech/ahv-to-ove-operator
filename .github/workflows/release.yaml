name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

jobs:
  build-push:
    name: Build & Push Operator Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push operator image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/lightwell-tech/ahv-to-ove-operator:v${{ steps.version.outputs.VERSION }}
            ghcr.io/lightwell-tech/ahv-to-ove-operator:latest

      - name: Build and push bundle image
        uses: docker/build-push-action@v5
        with:
          context: bundle
          file: bundle/Dockerfile
          push: true
          tags: |
            ghcr.io/lightwell-tech/ahv-to-ove-operator-bundle:v${{ steps.version.outputs.VERSION }}
            ghcr.io/lightwell-tech/ahv-to-ove-operator-bundle:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
